        }

        label {
            background-color: #FF8F8F;

        .navbar {
            background-color: #C2E2FA;
            height: 80px;
	    }

        #textofnav{
            color: #F39EB6;
            font-family: "Lucida Console", "Courier New", monospace;
            font-weight: bold;
            font-size: 20px;
            position: relative;
            font-size: 20px;
            position: relative;
	    }

	    #textofnav::after{
            content: '';
            height: 4px;
            width: 0%;
            margin: 0 auto;
            background-color: #F39EB6;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            transition: all 0.3s;
        }

        #textofnav:hover::after{
            width: 100%;
        }
       
    </style> 
</head>

<div class="container"> <!--creates container table for designing or organizing-->
    <h1>Account Registration</h1> <!-- page title-->
        <h4>Create an account:</h4> <!-- page subtitle-->
<br>
    <div class="container"> <!-- creates another table for the placeholders below-->
        <div class="form-group"> <!-- to make the background color of the labels longer, equalizing to the size of the placeholders-->
             
            <label for="username">Username:</label> <!-- label for username-->
              <br>
            <input type="text"  id="username" class="form-control" placeholder="Enter your Username"> <!--this is where you can input your username to create an account-->
            <label for="password">Password:</label> <!--label for password-->
              <br>
            <input type="text" id="password" class="form-control" placeholder="Enter your Password"> <!-- a placeholder to input your password-->
             </div>
              <br> 
    <button py-click="register" class="btn btn-default" id="register">Sign Up</button> <!-- this is a pyclick button that shows the registration results if pressed-->
    <div style="margin-top:10px; font-weight:bold;">
    <p id="output"></p>
    </div>

</div>
</div>
    <py-script src="signup.py"></py-script> <!-- connect to main.py that contains the functions rather than designs-->
