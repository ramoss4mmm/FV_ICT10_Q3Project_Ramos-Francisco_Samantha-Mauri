<style>
    body{
        background-color: #FFF1CB;

        font-family: "Lucida Console", "Courier New", monospace;

    #container1{
        padding: 25px;

    #container2{
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 10px #ffdd81;
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
        margin: auto;
        width: 800px;
    }
    .navbar {
        background-color: #C2E2FA;
        height: 80px;
	}
    #textofnav{
		color: #F39EB6;
		font-family: "Lucida Console", "Courier New", monospace;
		font-weight: bold;
		font-size: 20px;
		position: relative;
	}
	#textofnav::after{
		content: '';
		height: 4px;
		width: 0%;
		margin: 0 auto;
		background-color: #F39EB6;
		position: absolute;
		bottom: 0;
		left: 0;
		right: 0;
		transition: all 0.3s;
	}
	#textofnav:hover::after{
		width: 100%;
	}
</style>

<nav class="navbar navbar-expand-md navbar-light fixed-top">
		
	<div class="container-fluid">

			<ul class="navbar-nav mx-auto">

				<li class="nav-item">
					<a class="nav-link" href="teamchecker.html" id="textofnav">Team Checker</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" href="listofplayers.html" id="textofnav">List of players</a>
				</li>
			</ul>
			
			<form class="d-flex">
				<input class="form-control" type="search" placeholder="Search...">
				<button class="btn btn-default" type="submit">Seach</button>
			</form>

	</div>

<br><br><br><br>

<div id="container1">
    <h1>Intramurals Team</h1>
    <!-- asks the user if they are done with the online registration-->
    <h3>Are you done with the online regristration?</h3>
        <input class="form-check-input" type="radio" id="registered" name="registration" value="registered"> 
        <label class="form-check-label" for="registered">Yes</label>
        <input class="form-check-input" type="radio" id="notregistered" name="registration" value="notregistered"> 
        <label class="form-check-label" for="notregistered">No</label>

    <br><br>

    <!-- asks the user if they have a medical clearance -->
    <h3>Do you have a medical clearance?</h3>
        <input class="form-check-input" type="radio" id="medyes" name="med" value="Yes"> 
        <label class="form-check-label" for="med">Yes</label>
        <input class="form-check-input" type="radio" id="medno" name="med" value="No"> 
        <label class="form-check-label" for="medno">No</label>

    <br><br>

    <!-- selection for the users grade level -->
    <h3>What is your grade level?</h3>
        <select id="level" class="form-select">
            <option selected disabled>Select a Grade Level...</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
        </select>
    
    <br><br>

    <!-- selection for the users section -->
    <h3>What is your section?</h3>
        <select id="section" class="form-select">
            <option selected disabled>Select a Grade Level...</option>
            <option>Emerald</option>
            <option>Ruby</option>
            <option>Sapphire</option>
            <option>Topaz</option>
            <option>Jade</option>
        </select>

<br>
<!-- runs the code -->
<button type="submit" class="btn btn-default" py-click="intramsteam" id="button1">Sign Up</button>
<!-- displays the Intramurals team -->
<p id="output1"></p>
</div>
